<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>캐릭터 도감</title>
    <!-- PapaParse 라이브러리 로드 -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Nanum+Myeongjo&display=swap');
        
        :root {
            --bg-color: #f4f4f9;
            --card-bg: rgba(255, 255, 255, 0.9);
            --text-color: #333;
            --point-color: #2c3e50;
        }

        body {
            font-family: 'Nanum Myeongjo', serif;
            background-image: url('https://i.imgur.com/2Gz7K1v.png');
            background-size: cover;
            background-attachment: fixed;
            background-position: center;
            margin: 0;
            padding: 20px;
            color: var(--text-color);
        }

        h1 { text-align: center; color: white; text-shadow: 2px 2px 4px rgba(0,0,0,0.5); }

        .container {
            max-width: 900px;
            margin: 0 auto;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px;
        }

        .card {
            background: var(--card-bg);
            border-radius: 15px;
            padding: 15px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            transition: transform 0.2s;
            cursor: pointer;
        }

        .card:hover { transform: translateY(-5px); }
        .card img { width: 100%; height: 200px; object-fit: cover; border-radius: 10px; }
        .card h2 { margin: 10px 0; color: var(--point-color); }
        .card p { margin: 5px 0; font-size: 0.9em; }
        .partner { font-weight: bold; color: #d35400; }
        
        #loading { text-align: center; color: white; font-size: 1.2em; margin-top: 50px; }
    </style>
</head>
<body>

    <h1>나의 캐릭터 도감</h1>
    <div id="loading">데이터를 불러오는 중입니다...</div>
    <div class="container" id="grid"></div>

    <script>
        // 사용자가 제공한 구글 시트 CSV 링크
        const GOOGLE_SHEET_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vS8r7glozxSVeduTc4gZviISOsmJSZWx68Z_YCLmUQ1E_Oez0d22Sga6EFUoxXKYjyZf6ySeHmQ0sj_/pub?output=csv';

        Papa.parse(GOOGLE_SHEET_URL, {
            download: true,
            header: true,
            complete: function(results) {
                document.getElementById('loading').style.display = 'none';
                const grid = document.getElementById('grid');
                
                results.data.forEach(row => {
                    // 빈 행은 건너뜁니다.
                    if (!row['이름']) return;

                    const card = document.createElement('div');
                    card.className = 'card';
                    card.innerHTML = `
                        <img src="${row['이미지링크']}" alt="${row['이름']}">
                        <h2>${row['이름']}</h2>
                        <p><strong>속성:</strong> ${row['속성'] || '-'}</p>
                        <p><strong>설명:</strong> ${row['상세설명'] || '-'}</p>
                        <p class="partner"><strong>짝꿍:</strong> ${row['짝꿍'] || '없음'}</p>
                    `;
                    grid.appendChild(card);
                });
            },
            error: function(err) {
                document.getElementById('loading').textContent = "데이터를 불러오는 데 실패했습니다. 시트 제목을 확인해주세요.";
                console.error(err);
            }
        });
    </script>
